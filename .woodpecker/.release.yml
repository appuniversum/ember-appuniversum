steps:
  release:
    image: node:18
    environment:
      NPM_ACCESS_TOKEN:
        from_secret: npm_access_token
    commands:
      - npm install -g pnpm@10.32.0
      - pnpm install --frozen-lockfile
      - npm config set //registry.npmjs.org/:_authToken $NPM_ACCESS_TOKEN
      - pnpm --filter @appuniversum/ember-appuniversum publish
when:
  event: tag
  ref: refs/tags/v*
