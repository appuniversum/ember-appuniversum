name: Storybook Build
on:
  push:
    branches:
      - master

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: pnpm
      - name: Install Dependencies
        run:  pnpm install --frozen-lockfile
      - name: Build addon
        run: pnpm --filter @appuniversum/ember-appuniversum build
      - name: Build docs app
        run: pnpm --filter docs-app build
        env:
          ROOT_URL: /ember-appuniversum/
      - name: Build Storybook
        run: pnpm --filter docs-app build-storybook
      - name: Deploy
        if: success()
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: gh-pages
          build_dir: docs-app/storybook-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
