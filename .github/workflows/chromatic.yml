name: "Chromatic"

# Manually trigger the workflow when needed
on: workflow_dispatch

jobs:
  chromatic-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 👈 Required to retrieve git history: https://www.chromatic.com/docs/github-actions#support-for-codeactionscheckoutv2code-and-above
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build addon
        run: pnpm --filter @appuniversum/ember-appuniversum build
      - name: Build
        run: pnpm --filter docs-app prep-chromatic
      - name: Publish to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: docs-app
